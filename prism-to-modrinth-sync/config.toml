# Copy to config.toml. Values here are non-secret defaults; put secrets in
# config.local.toml (gitignored) or in the MODRINTH_PAT environment variable.

# Path to the Prism instance root (dir containing instance.cfg and mmc-pack.json).
# Absolute, or relative to this config file's directory.
instance_path = "../Deer Diary"

# Pack identity. `name` becomes the modpack display name in mrpack metadata.
# `summary` is optional.
name = "Deer Diary"
summary = ""

# Modrinth project id or slug. Required for `sync publish`; not needed for `sync build`.
project_id = ""

# Required by the Modrinth API. Use a uniquely identifying string.
user_agent = "ryan/prism-to-modrinth-sync (https://modrinth.com/modpack/deer-diary)"

# Subdirectories under <instance>/minecraft/ to include in the pack.
include_paths = [
    "mods",
    "config",
    "resourcepacks",
    "shaderpacks",
    "defaultconfigs",
    "moonlight-global-datapacks",
]

# Glob patterns (relative to <instance>/minecraft/) to always ignore.
# The instance's own .packignore is also applied automatically.
# (mods/.index/ and mods/.connector/ are always skipped — no need to list them.)
extra_ignore = [
    "mods (2).zip",
    ".mixin.out/**",
    "downloads/**",
    "logs/**",
    "crash-reports/**",
    "data/**",
    "coremods/**",
    "dynamic-resource-pack-cache/**",
    "**/*.disabled",
    "shaderpacks/*.txt",
    "shaderpacks/*.zip.txt",
    # Unpacked shader directories are runtime-generated by EuphoriaPatcher;
    # ship only the source .zip and let the patcher regenerate on the consumer's side.
    "shaderpacks/*/**",
    # FTB Essentials + FTB Library are on Modrinth's content-rules deny list
    # regardless of permission; we ship deer-diary-commands instead. Locally
    # they're deleted — these jar patterns are kept defensively in case the
    # jars come back later (e.g. accidentally reinstalled).
    "mods/ftb-essentials-*.jar",
    "mods/ftb-library-*.jar",
    # Broad config sweep: any FTB-prefixed config (ftbessentials, ftblibrary,
    # etc.) — these are leftover from the deleted mods and ship as dead weight
    # without their parent jar.
    "config/ftb*",
    "defaultconfigs/ftb*",
    # Runtime-mutated configs that get rewritten on game start / world load
    # and produce diff noise without representing intentional pack changes.
    "config/fabric/indigo-renderer.properties",
    "config/packetfixer.properties",
    # Everything under config/jei/world/ is per-world/per-server state
    # (lookup history, bookmarks, etc.) keyed by world hash — never ship.
    "config/jei/world/**",
]

# Allowlist: paths to include even if they match an ignore pattern. Use for
# default-off alternatives — e.g. a `.disabled` mod jar you want consumers to be
# able to toggle on. These ship verbatim as overrides; the consumer enables them
# by removing the `.disabled` suffix.
optional_files = [
    # Alt-renderer for consumers without a beefy enough GPU for Iris+Colorwheel.
    "mods/sodiumdynamiclights-neoforge-1.0.10-1.21.1.jar.disabled",
]

# Locally-built mods. Refreshed in-place before each pack build.
[[custom_mods]]
name = "trmt"
source_dir = "../Custom Mods/dist/trmt-neoforge-1.21.1"

[[custom_mods]]
name = "deer-diary-commands"
source_dir = "../Custom Mods/dist/deer-diary-commands"

# Datapack ships through the Packwiz pipeline as a self-hosted direct file.
# Versionless filename → the custom-mod sync falls back to byte compare.
[[custom_mods]]
name = "key-to-necklace"
source_dir = "../Custom Mods/dist/key-to-necklace"
source_pattern = "key-to-necklace.zip"
target_dir = "moonlight-global-datapacks"


# =========================================================================
# Packwiz publishing pipeline
# =========================================================================
# Generates a static Packwiz tree (pack.toml + index.toml + metafiles +
# self-hosted direct files) under `output_dir`. Players install a small
# bootstrap Prism instance that runs packwiz-installer-bootstrap.jar before
# Minecraft launches; that resolves changes against `base_url` and updates
# the local pack in place. Independent of the Modrinth pipeline above —
# both can run, sharing `.last-published-state.json` and `CHANGELOG.md`.

[packwiz]
enabled = true

# Generated web root. Relative paths resolve against this file's directory,
# so `../docs/packwiz` puts the tree at the repo root under docs/ (where
# GitHub Pages can serve it from main).
output_dir = "../docs/packwiz"

# Public URL the bootstrap installer hits. The pack.toml lives at
# `${base_url}/pack.toml`; relative paths inside index.toml resolve against
# the same base. Update once GitHub Pages is enabled and the canonical URL
# is known.
base_url = "https://toxicbananaparty.github.io/deer-diary/packwiz"

# Pack metadata. Author shows up in packwiz-installer dialogs and pack.toml.
author = "ToxicBananaParty"
pack_format = "packwiz:1.1.0"

# Pin the bootstrap jar version we expect players to use, so the bootstrap
# instance zip ships a known-good build. Bump deliberately, not implicitly.
bootstrap_installer_url = "https://github.com/packwiz/packwiz-installer-bootstrap/releases/download/v0.0.3/packwiz-installer-bootstrap.jar"

[packwiz.self_host]
# Allowlist for mod jars we'll copy into the published tree as direct files
# (no Modrinth/CurseForge metafile). Two situations match:
#   - Our own builds (custom mods, custom datapacks): no upstream metafile.
#   - CurseForge-only mods whose author granted us redistribution permission:
#     we'd rather ship the jar than make every player configure a CF API
#     key in packwiz-installer. These entries override their .pw.toml.
# Modrinth-backed mods don't need to appear here — they pass through as
# native metafiles and players fetch them from Modrinth's CDN.
allowed_globs = [
    # Own builds:
    "mods/trmt-*.jar",
    "mods/deer-diary-commands-*.jar",
    "moonlight-global-datapacks/key-to-necklace.zip",
    # CurseForge-only mods, redistribution permitted by upstream authors:
    "mods/alltheleaks-*.jar",
    "mods/configured-neoforge-*.jar",
    "mods/extendedbeaconrange-*.jar",
    "mods/ironchest-*-neoforge-*.jar",
]
