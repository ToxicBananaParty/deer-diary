# Copy to config.toml. Values here are non-secret defaults; put secrets in
# config.local.toml (gitignored) or in the MODRINTH_PAT environment variable.

# Path to the Prism instance root (dir containing instance.cfg and mmc-pack.json).
# Absolute, or relative to this config file's directory.
instance_path = "../Deer Diary"

# Pack identity. `name` becomes the modpack display name in mrpack metadata.
# `summary` is optional.
name = "Deer Diary"
summary = ""

# Modrinth project id or slug. Required for `sync publish`; not needed for `sync build`.
project_id = ""

# Required by the Modrinth API. Use a uniquely identifying string.
user_agent = "ryan/prism-to-modrinth-sync (https://modrinth.com/modpack/deer-diary)"

# Subdirectories under <instance>/minecraft/ to include in the pack.
include_paths = [
    "mods",
    "config",
    "resourcepacks",
    "shaderpacks",
    "defaultconfigs",
    "moonlight-global-datapacks",
]

# Glob patterns (relative to <instance>/minecraft/) to always ignore.
# The instance's own .packignore is also applied automatically.
# (mods/.index/ and mods/.connector/ are always skipped — no need to list them.)
extra_ignore = [
    "mods (2).zip",
    ".mixin.out/**",
    "downloads/**",
    "logs/**",
    "crash-reports/**",
    "data/**",
    "coremods/**",
    "dynamic-resource-pack-cache/**",
    "**/*.disabled",
    "shaderpacks/*.txt",
    "shaderpacks/*.zip.txt",
    # Unpacked shader directories are runtime-generated by EuphoriaPatcher;
    # ship only the source .zip and let the patcher regenerate on the consumer's side.
    "shaderpacks/*/**",
]

# Allowlist: paths to include even if they match an ignore pattern. Use for
# default-off alternatives — e.g. a `.disabled` mod jar you want consumers to be
# able to toggle on. These ship verbatim as overrides; the consumer enables them
# by removing the `.disabled` suffix.
optional_files = [
    # Example: ship a disabled alt-renderer mod for consumers on weaker GPUs.
    # "mods/sodiumdynamiclights-neoforge-1.0.10-1.21.1.jar.disabled",
]

# Mods you build yourself locally. Each entry needs:
#   name        — display name; also the default filename prefix
#   source_dir  — where the artifact lives (absolute or relative to this config)
#   target_dir  — destination subdir under <instance>/minecraft/ (default "mods")
#   source_pattern — glob for matching the artifact in source_dir AND target_dir.
#                    Defaults to `<name>-*.jar`. Override for unversioned files
#                    or non-jar artifacts (e.g. "key-to-necklace.zip", "*.zip").
#
# Before each build, the tool checks source_dir; if a newer version is there,
# replaces the artifact in the instance in-place. Versionless filenames fall
# back to byte-compare (replace iff source bytes differ from target bytes).
# [[custom_mods]]
# name = "trmt"
# source_dir = "../Custom Mods/dist/trmt-neoforge-1.21.1"
# [[custom_mods]]
# name = "key-to-necklace"
# source_dir = "../Custom Mods/dist/key-to-necklace"
# source_pattern = "key-to-necklace.zip"
# target_dir = "moonlight-global-datapacks"


# =========================================================================
# Packwiz publishing pipeline (optional, independent of Modrinth)
# =========================================================================
# Enables a `packwiz-build` / `packwiz-check` / `packwiz-publish` workflow
# that generates a static Packwiz tree from the Prism instance. Players
# install a small bootstrap Prism instance whose pre-launch hook runs
# packwiz-installer-bootstrap.jar against `base_url/pack.toml`, updating
# files in place before each launch. Shares state and changelog with the
# Modrinth pipeline above.

# [packwiz]
# enabled = false
# output_dir = "../docs/packwiz"
# base_url = "https://<user>.github.io/<repo>/packwiz"
# author = "Your Name"
# pack_format = "packwiz:1.1.0"
# bootstrap_installer_url = "https://github.com/packwiz/packwiz-installer-bootstrap/releases/download/v0.0.3/packwiz-installer-bootstrap.jar"
#
# [packwiz.self_host]
# # Allowlist for mod jars we copy as direct files (no Modrinth/CF metafile).
# # Mods that already have a `.pw.toml` in `mods/.index/` skip this list
# # entirely — they're emitted as native metafiles. Everything else needs
# # to be either Modrinth-backed or explicitly allowlisted here.
# allowed_globs = [
#     "mods/your-custom-mod-*.jar",
# ]
