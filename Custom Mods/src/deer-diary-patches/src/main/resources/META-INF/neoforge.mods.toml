modLoader = "javafml"
loaderVersion = "${loader_version}"
license = "MIT"

[[mods]]
    modId = "${mod_id}"
    version = "${version}"
    displayName = "Deer Diary Patches"
    description = '''A container for small patches (Mixin and mod-integration) against third-party mods in the Deer Diary modpack. Fixes Tom's Simple Storage Polymorphic Filter behavior, quiets harmless netty/UDP log spam from Minecraft and Sable, and lets Create Aeronautics' Aviator's Goggles be worn (and function) in the Curios head slot.'''
    authors = "Ryan"

[[mixins]]
    config = "deer_diary_patches.minecraft.mixins.json"

[[mixins]]
    config = "deer_diary_patches.sable.mixins.json"

[[mixins]]
    config = "deer_diary_patches.tomsstorage.mixins.json"

[[dependencies.${mod_id}]]
    modId = "neoforge"
    type = "required"
    versionRange = "[${neoforge_version},)"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.${mod_id}]]
    modId = "minecraft"
    type = "required"
    versionRange = "[${minecraft_version},1.21.2)"
    ordering = "NONE"
    side = "BOTH"

# Tom's Simple Storage — declared optional so this mod loads cleanly if TSS is
# absent (the Mixin config sets `required = false` so missing targets are a
# warning rather than a crash). Ordering AFTER so our Mixin sees TSS classes.
[[dependencies.${mod_id}]]
    modId = "toms_storage"
    type = "optional"
    versionRange = "[1.21-2.3.0,)"
    ordering = "AFTER"
    side = "BOTH"

# Curios / Create / Aeronautics — optional deps for the Aviator's Goggles
# curios-slot bridge. AFTER so we load once their items/classes exist; the
# bridge code is guarded by ModList checks so absence is harmless.
[[dependencies.${mod_id}]]
    modId = "curios"
    type = "optional"
    versionRange = "[9.0.0,)"
    ordering = "AFTER"
    side = "BOTH"

[[dependencies.${mod_id}]]
    modId = "create"
    type = "optional"
    versionRange = "[6.0.0,)"
    ordering = "AFTER"
    side = "BOTH"

[[dependencies.${mod_id}]]
    modId = "aeronautics"
    type = "optional"
    versionRange = "[1.2.0,)"
    ordering = "AFTER"
    side = "BOTH"
