plugins {
    id 'java'
    id 'net.neoforged.moddev' version '0.1.96'
}

version = project.mod_version
group = project.maven_group

java {
    toolchain.languageVersion.set(JavaLanguageVersion.of(21))
    withSourcesJar()
}

neoForge {
    version = project.neoforge_version

    parchment {
        minecraftVersion = project.parchment_minecraft_version
        mappingsVersion = project.parchment_mappings_version
    }

    runs {
        client {
            client()
            // Nvidium is memory-hungry; mirror the loom build's run args.
            jvmArguments.addAll("-Xmx8G", "-XX:+UseZGC")
        }
    }

    mods {
        nvidium {
            sourceSet sourceSets.main
        }
    }
}

repositories {
    // Sodium (required) and Iris (soft-compat) come from Modrinth's maven.
    maven {
        url = "https://api.modrinth.com/maven"
        content { includeGroup "maven.modrinth" }
    }
}

dependencies {
    // Required, compile + dev runtime.
    implementation "maven.modrinth:sodium:${project.sodium_version}"

    // Soft-compat deps declared as `implementation` so the dev runClient actually
    // loads them AS MODS: ModDevGradle's FML dev mod-discovery scans implementation
    // jars that carry a neoforge.mods.toml (proven by Sodium above), whereas
    // `clientAdditionalRuntimeClasspath` only puts them on the classpath and they
    // are NOT mod-loaded. Runtime optionality in the published pack is governed by
    // the `optional` dependency entries in neoforge.mods.toml, not the Gradle scope,
    // and all references are guarded by ModList.isLoaded(...), so the mod still
    // loads fine when these are absent.
    implementation "maven.modrinth:iris:${project.iris_version}"
    implementation "maven.modrinth:distanthorizons:${project.distanthorizons_version}"

    // Colorwheel is only needed for Phase 4 (Colorwheel coexistence). It hard-requires
    // Flywheel/Create, which aren't on the dev classpath yet, so keep it compileOnly
    // for now (off the dev runtime so it can't crash on missing deps). Phase 4 promotes
    // it to a loaded mod alongside Flywheel/Create.
    compileOnly "maven.modrinth:colorwheel:${project.colorwheel_version}"
}

// Short git commit baked into mods.toml's [modproperties.nvidium].commit so
// Nvidium.getModVersion() can return "<version>-<commit>" as on Fabric.
def gitCommitHash = providers.exec {
    commandLine 'git', 'rev-parse', '--short', 'HEAD'
}.standardOutput.asText.map { it.trim() }

processResources {
    var replaceProperties = [
        version          : version,
        commit           : gitCommitHash.get(),
        loader_version   : project.hasProperty('loader_version') ? project.loader_version : '[4,)',
        neoforge_version : project.neoforge_version,
        minecraft_version: project.minecraft_version,
        mod_id           : project.mod_id,
    ]
    inputs.properties(replaceProperties)
    filesMatching(['META-INF/neoforge.mods.toml']) {
        expand replaceProperties
    }
}

// Mirror the built jar into Custom Mods/dist/nvidium/ so the publish pipeline
// (prism-to-modrinth-sync) picks it up as a [[custom_mods]] source.
tasks.register('copyJarToDist', Copy) {
    dependsOn jar
    from jar.archiveFile
    into rootProject.file('../../dist/nvidium')
}
build.finalizedBy(copyJarToDist)
