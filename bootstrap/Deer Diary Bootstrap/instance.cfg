[General]
ConfigVersion=1.3
iconKey=default
name=Deer Diary
InstanceType=OneSix
JoinServerOnLaunch=false
notes=Auto-updates from https://toxicbananaparty.github.io/deer-diary/packwiz/pack.toml before each launch (Packwiz Installer Bootstrap).
ManagedPack=false

OverrideCommands=true
PreLaunchCommand=\"$INST_JAVA\" -jar \"$INST_MC_DIR/packwiz-installer-bootstrap.jar\" \"https://toxicbananaparty.github.io/deer-diary/packwiz/pack.toml\"

AutomaticJava=true
IgnoreJavaCompatibility=false

OverrideJavaArgs=true
JvmArgs=-XX:+UseZGC -XX:+ZGenerational

OverrideMemory=true
MaxMemAlloc=8192
MinMemAlloc=4096
PermGen=128

LogPrePostOutput=true
LowMemWarning=true
